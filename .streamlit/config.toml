# Keeps the app on a light theme so custom CSS in app/streamlit_app.py reads consistently
# (avoids dark main canvas + light sidebar mismatch in browser/OS dark mode).

[theme]
base = "light"
primaryColor = "#4f46e5"
backgroundColor = "#f0f4f8"
secondaryBackgroundColor = "#f8fafc"
textColor = "#0f172a"
font = "sans serif"

[client]
toolbarMode = "minimal"
